name: Deploy

on:
    workflow_dispatch:  # manual dispatch
        inputs:
            imageTag:
                description: 'Docker image tag to deploy (default: git SHA)'
                required: false
                default: ''
    # push:
    #     branches: [main]

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: false

jobs:
    push-images:
        name: Build & Push (${{ matrix.service }})
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        strategy:
            fail-fast: true
            matrix:
                service: [api, worker, frontend]

        outputs:
            imageTag: ${{ steps.tag.outputs.tag }}

        steps:
            - uses: actions/checkout@v5

            - name: Determine image tag
              id: tag
              run: |
                  TAG="${{ github.event.inputs.imageTag }}"
                  if [ -z "$TAG" ]; then
                    TAG="${{ github.sha }}"
                  fi
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
                  aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

            - name: Log in to Amazon ECR
              id: ecr-login
              uses: aws-actions/amazon-ecr-login@v2

            - uses: docker/setup-buildx-action@v3

            - name: Build & push ${{ matrix.service }}
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: docker/Dockerfile.${{ matrix.service }}
                  target: production
                  push: true
                  tags: |
                      ${{ steps.ecr-login.outputs.registry }}/documents/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
                      ${{ steps.ecr-login.outputs.registry }}/documents/${{ matrix.service }}:latest
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service }}

    cdk-deploy:
        name: CDK Deploy
        runs-on: ubuntu-latest
        needs: push-images
        permissions:
            id-token: write
            contents: read
        defaults:
            run:
                working-directory: infrastructure/cdk

        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: 'npm'
                  cache-dependency-path: infrastructure/cdk/package-lock.json

            - name: Install CDK dependencies
              run: npm ci

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
                  aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

            - name: CDK Synth (pre-deploy validation)
              run: npx cdk synth --quiet
              env:
                  CDK_REQUIRE_AUTH_ENV: 'true'
                  CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
                  CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
                  ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
                  COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
                  COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}

            - name: CDK Deploy — Infra stack
              run: npx cdk deploy DocumentsInfraStack --require-approval never
              env:
                  CDK_REQUIRE_AUTH_ENV: 'true'
                  CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
                  CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
                  ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
                  COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
                  COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}

            - name: CDK Deploy — Services stack
              run: |
                  TAG="${{ github.event.inputs.imageTag }}"
                  if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
                  npx cdk deploy DocumentsServicesStack \
                    --require-approval never \
                    --context imageTag="$TAG"
              env:
                  CDK_REQUIRE_AUTH_ENV: 'true'
                  CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
                  CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
                  ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
                  COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
                  COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
