version: '3.8'

services:
    localstack:
        image: localstack/localstack:4.14.0
        container_name: documents-localstack
        ports:
            - '4566:4566'
        environment:
            - SERVICES=${LOCALSTACK_SERVICES}
            - DEBUG=${LOCALSTACK_DEBUG}
            - PERSISTENCE=1
        volumes:
            - localstack-data:/var/lib/localstack
            - ./infrastructure/localstack:/etc/localstack/init/ready.d
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - backend

    ollama:
        image: ollama/ollama:latest
        container_name: documents-ollama
        ports:
            - '11434:11434'
        environment:
            - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX}
            - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
            - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS}
        volumes:
            - ollama-data:/root/.ollama
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:11434/api/tags']
            interval: 15s
            timeout: 10s
            retries: 5
        networks:
            - backend
        entrypoint:
            [
                '/bin/sh',
                '-c',
                'ollama serve & until ollama list 2>/dev/null; do sleep 1; done && ollama pull ${AI_MODEL} && wait'
            ]

    nginx:
        image: nginx:alpine
        container_name: documents-nginx
        ports:
            - '80:80'
        volumes:
            - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            api:
                condition: service_started
            frontend:
                condition: service_started
        networks:
            - frontend
            - backend
        restart: unless-stopped

    keycloak:
        image: quay.io/keycloak/keycloak
        container_name: documents-keycloak
        ports:
            - '8080:8080'
        environment:
            KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
            KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
        volumes:
            - ./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
        command: start-dev --import-realm
        healthcheck:
            test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/health/ready || exit 1']
            interval: 20s
            timeout: 10s
            retries: 15
        networks:
            - backend

    api:
        build:
            context: .
            dockerfile: docker/Dockerfile.api
            target: development
        environment:
            NODE_ENV: ${NODE_ENV}
            JWT_SECRET: ${JWT_SECRET}
            PORT: ${API_PORT}
            AWS_ENDPOINT: ${AWS_ENDPOINT}
            AWS_REGION: ${AWS_REGION}
            AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
            S3_BUCKET: ${S3_BUCKET}
            S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:4566}
            DYNAMODB_TABLE: ${DYNAMODB_TABLE}
            SNS_TOPIC_ARN: ${SNS_TOPIC_ARN}
            SQS_QUEUE_URL: ${SQS_QUEUE_URL}
            CORS_ORIGIN: ${CORS_ORIGIN}
            AI_PROVIDER: ${AI_PROVIDER}
            AI_MODEL: ${AI_MODEL}
            OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
            AUTH_PROVIDER: ${AUTH_PROVIDER:-keycloak}
            AUTH_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-documents}
            AUTH_AUDIENCE: ${AUTH_AUDIENCE}
            KEYCLOAK_URL: http://keycloak:8080
            AUTH_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-documents}/protocol/openid-connect/certs
            KEYCLOAK_REALM: ${KEYCLOAK_REALM:-documents}
            KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
            KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
            KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-documents-api}
            KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
            COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
            COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
        depends_on:
            localstack:
                condition: service_healthy
            keycloak:
                condition: service_started
        networks:
            - frontend
            - backend
        restart: unless-stopped
        expose:
            - '${API_PORT}'
        volumes:
            - ./services/api/src:/app/services/api/src
            - ./packages/shared/src:/app/packages/shared/src
            - ./packages/shared/dist:/app/packages/shared/dist
        command: npm run start:dev -w @documents/api

    worker:
        build:
            context: .
            dockerfile: docker/Dockerfile.worker
            target: development
        environment:
            NODE_ENV: ${NODE_ENV}
            JWT_SECRET: ${JWT_SECRET}
            PORT: ${WORKER_PORT}
            AWS_ENDPOINT: ${AWS_ENDPOINT}
            AWS_REGION: ${AWS_REGION}
            AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
            S3_BUCKET: ${S3_BUCKET}
            DYNAMODB_TABLE: ${DYNAMODB_TABLE}
            SNS_TOPIC_ARN: ${SNS_TOPIC_ARN}
            SQS_QUEUE_URL: ${SQS_QUEUE_URL}
            SQS_DLQ_URL: ${SQS_DLQ_URL}
            SQS_THUMBNAIL_QUEUE_URL: ${SQS_THUMBNAIL_QUEUE_URL}
            SQS_POLLING_INTERVAL: ${SQS_POLLING_INTERVAL}
            SQS_MAX_MESSAGES: ${SQS_MAX_MESSAGES}
            AI_PROVIDER: ${AI_PROVIDER}
            AI_MODEL: ${AI_MODEL}
            OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
        depends_on:
            localstack:
                condition: service_healthy
            ollama:
                condition: service_started
        networks:
            - backend
        restart: unless-stopped
        expose:
            - '${WORKER_PORT}'
        volumes:
            - ./services/worker/src:/app/services/worker/src
            - ./packages/shared/src:/app/packages/shared/src
            - ./packages/shared/dist:/app/packages/shared/dist
        command: npm run start:dev -w @documents/worker

    frontend:
        build:
            context: .
            dockerfile: docker/Dockerfile.frontend
            target: development
        environment:
            NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
            NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        depends_on:
            - api
        networks:
            - frontend
        restart: unless-stopped
        expose:
            - '${FRONTEND_PORT}'
        volumes:
            - ./frontend/src:/app/frontend/src
        command: npm run dev -w @documents/frontend

networks:
    frontend:
        driver: bridge
    backend:
        driver: bridge

volumes:
    localstack-data:
    ollama-data:
